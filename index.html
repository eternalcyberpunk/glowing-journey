<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AVATAR: Last Stand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

/* Crosshair */
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.75);}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
#crosshair::after{height:2px;width:100%;top:50%;transform:translateY(-50%);}
.crosshair-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;transform:translate(-50%,-50%);}

/* HUD */
#hud-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 18px 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
#portrait-block{display:flex;align-items:flex-end;gap:10px;}
#portrait-frame{width:64px;height:64px;border:1px solid rgba(255,255,255,0.2);position:relative;overflow:hidden;flex-shrink:0;}
#portrait-canvas{width:64px;height:64px;}
#hero-info{display:flex;flex-direction:column;justify-content:flex-end;gap:3px;}
#hero-name-hud{font-size:11px;letter-spacing:3px;font-weight:bold;}
#hero-title-hud{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;}
#bars-block{display:flex;flex-direction:column;gap:5px;width:160px;}
.bar-row{display:flex;align-items:center;gap:6px;}
.bar-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.4);width:32px;}
.bar-track{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.25s;}
#dodge-fill{background:rgba(255,255,255,0.5);}

#abilities-block{display:flex;gap:8px;align-items:flex-end;}
.ability-slot{width:50px;height:50px;border:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;gap:3px;}
.ability-icon{font-size:20px;line-height:1;}
.ability-key{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.35);}
.ability-cooldown{position:absolute;bottom:0;left:0;right:0;height:2px;}
.ability-cost{position:absolute;top:2px;right:3px;font-size:7px;color:rgba(255,255,255,0.3);}

/* Wave / score top */
#hud-top{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;}
#score-block{text-align:left;}
#score-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.35);}
#score-val{font-size:20px;font-weight:bold;color:rgba(255,255,255,0.9);}
#wave-block{text-align:center;}
#wave-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.35);}
#wave-val{font-size:20px;font-weight:bold;}
#enemies-block{text-align:right;}
#enemies-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.35);}
#enemies-val{font-size:20px;font-weight:bold;color:rgba(255,255,255,0.9);}

/* Announcements */
#wave-announce{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.4s;}
#wave-announce-main{font-size:32px;letter-spacing:8px;font-weight:bold;}
#wave-announce-sub{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.5);margin-top:6px;}
#special-announce{position:absolute;top:38%;left:50%;transform:translateX(-50%);font-size:15px;letter-spacing:5px;opacity:0;transition:opacity 0.3s;pointer-events:none;text-align:center;}
#lore-box{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:min(480px,90vw);background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.12);padding:12px 16px;opacity:0;transition:opacity 0.4s;pointer-events:none;}
#lore-speaker{font-size:9px;letter-spacing:3px;margin-bottom:4px;}
#lore-text{font-size:12px;color:rgba(255,255,255,0.7);line-height:1.6;}
#hit-flash{position:absolute;inset:0;background:rgba(255,40,40,0.18);opacity:0;transition:opacity 0.12s;pointer-events:none;}
#charge-bar{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);width:90px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;display:none;overflow:hidden;}
#charge-fill-bar{height:100%;width:0%;border-radius:2px;transition:width 0.04s;}
#kill-feed{position:absolute;top:80px;right:18px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.kill-entry{font-size:10px;letter-spacing:2px;padding:3px 8px;background:rgba(0,0,0,0.5);border-right:2px solid;opacity:1;transition:opacity 1s;}

/* Mobile controls */
#mobile-controls{position:fixed;bottom:0;left:0;right:0;z-index:20;pointer-events:none;display:none;}
.joystick-zone{position:absolute;bottom:16px;width:120px;height:120px;pointer-events:all;}
#joy-move{left:14px;}
#joy-look{right:14px;}
.joy-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);}
.joy-nub{position:absolute;top:50%;left:50%;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.18);transform:translate(-50%,-50%);}
#mob-action-btns{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:14px;pointer-events:all;}
.mob-btn{width:58px;height:58px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:white;font-size:9px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:2px;pointer-events:all;-webkit-tap-highlight-color:transparent;}
.mob-btn .mob-icon{font-size:20px;line-height:1;}

/* Overlays */
#overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);overflow-y:auto;}
#main-menu-wrap{width:min(640px,96vw);padding:24px 0;}

#menu-title{text-align:center;margin-bottom:32px;}
#menu-title h1{font-size:42px;letter-spacing:8px;color:white;}
#menu-title .sub{font-size:10px;letter-spacing:5px;color:rgba(255,255,255,0.3);margin-top:4px;}

.section-label{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-bottom:10px;padding:0 2px;}
#hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px;}
@media(max-width:500px){#hero-grid{grid-template-columns:repeat(2,1fr);}}
.hero-card{padding:12px 10px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.18s;text-align:center;position:relative;}
.hero-card:hover{border-color:rgba(255,255,255,0.25);transform:translateY(-2px);}
.hero-card.selected{border-width:2px;}
.hero-portrait{width:48px;height:48px;margin:0 auto 8px;border-radius:2px;overflow:hidden;}
.hero-portrait canvas{width:48px;height:48px;}
.hero-card-name{font-size:11px;font-weight:bold;letter-spacing:2px;margin-bottom:2px;}
.hero-card-title{font-size:8px;color:rgba(255,255,255,0.35);letter-spacing:1px;margin-bottom:4px;}
.hero-card-element{font-size:9px;letter-spacing:1px;}
.hero-card-desc{font-size:8px;color:rgba(255,255,255,0.3);line-height:1.5;margin-top:6px;}

#hero-detail{margin-bottom:24px;padding:14px 16px;border:1px solid rgba(255,255,255,0.1);min-height:80px;}
#detail-name{font-size:16px;letter-spacing:4px;font-weight:bold;margin-bottom:2px;}
#detail-title{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-bottom:8px;}
#detail-lore{font-size:11px;color:rgba(255,255,255,0.55);line-height:1.7;margin-bottom:10px;}
#detail-stats{display:flex;gap:16px;flex-wrap:wrap;}
.detail-stat{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.4);}
.detail-stat span{color:rgba(255,255,255,0.8);font-weight:bold;}

#start-btn{display:block;width:100%;padding:14px;font-size:12px;letter-spacing:6px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:white;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:4px;}
#start-btn:hover{background:rgba(255,255,255,0.06);}

/* Upgrade overlay */
#upgrade-overlay{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);}
#upgrade-wrap{text-align:center;width:min(560px,94vw);}
#upgrade-wrap h2{font-size:18px;letter-spacing:6px;margin-bottom:2px;}
#upgrade-wrap .sub{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-bottom:24px;}
#upgrade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:480px){#upgrade-grid{grid-template-columns:repeat(2,1fr);}}
.upg-card{padding:14px 10px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;transition:all 0.18s;pointer-events:all;}
.upg-card:hover{border-color:rgba(255,255,255,0.35);transform:translateY(-2px);}
.upg-icon{font-size:22px;margin-bottom:6px;}
.upg-name{font-size:10px;font-weight:bold;letter-spacing:2px;margin-bottom:3px;}
.upg-desc{font-size:8px;color:rgba(255,255,255,0.4);line-height:1.5;}

/* Game over / win */
#result-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);}
#result-box{text-align:center;width:min(420px,90vw);}
#result-title{font-size:34px;letter-spacing:8px;margin-bottom:6px;}
#result-stat1{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-bottom:16px;}
#result-score{font-size:48px;font-weight:bold;margin-bottom:4px;}
#result-stat2{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);margin-bottom:28px;}
.result-btn{padding:12px 40px;font-size:11px;letter-spacing:5px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:white;cursor:pointer;font-family:inherit;margin:6px;}
.result-btn:hover{background:rgba(255,255,255,0.07);}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="hit-flash"></div>
  <div id="crosshair"><div class="crosshair-dot" id="crosshair-dot"></div></div>
  <div id="hud-top">
    <div id="score-block"><div id="score-label">SCORE</div><div id="score-val">0</div></div>
    <div id="wave-block"><div id="wave-label">WAVE</div><div id="wave-val">1 / 30</div></div>
    <div id="enemies-block"><div id="enemies-label">ENEMIES</div><div id="enemies-val">0</div></div>
  </div>
  <div id="hud-bottom">
    <div id="portrait-block">
      <div id="portrait-frame"><canvas id="portrait-canvas" width="64" height="64"></canvas></div>
      <div id="hero-info">
        <div id="hero-name-hud">—</div>
        <div id="hero-title-hud">—</div>
      </div>
    </div>
    <div id="bars-block">
      <div class="bar-row"><span class="bar-label">HP</span><div class="bar-track"><div class="bar-fill" id="hp-fill"></div></div></div>
      <div class="bar-row"><span class="bar-label">CHI</span><div class="bar-track"><div class="bar-fill" id="chi-fill-bar"></div></div></div>
      <div class="bar-row"><span class="bar-label">EVADE</span><div class="bar-track"><div class="bar-track"><div class="bar-fill" id="dodge-fill"></div></div></div></div>
    </div>
    <div id="abilities-block">
      <div class="ability-slot" id="ab-quick"><div class="ability-icon" id="ab-quick-icon">◎</div><div class="ability-key">CLICK</div><div class="ability-cooldown" id="ab-quick-cd"></div></div>
      <div class="ability-slot" id="ab-heavy"><div class="ability-icon" id="ab-heavy-icon">◉</div><div class="ability-key">HOLD</div><div class="ability-cost" id="ab-heavy-cost"></div></div>
      <div class="ability-slot" id="ab-special"><div class="ability-icon" id="ab-special-icon">★</div><div class="ability-key">Q / ★</div><div class="ability-cooldown" id="ab-special-cd"></div></div>
    </div>
  </div>
  <div id="wave-announce"><div id="wave-announce-main"></div><div id="wave-announce-sub"></div></div>
  <div id="special-announce"></div>
  <div id="lore-box"><div id="lore-speaker"></div><div id="lore-text"></div></div>
  <div id="charge-bar"><div id="charge-fill-bar"></div></div>
  <div id="kill-feed"></div>
</div>

<div id="mobile-controls">
  <div class="joystick-zone" id="joy-move"><div class="joy-base"></div><div class="joy-nub" id="joy-move-nub"></div></div>
  <div id="mob-action-btns">
    <div class="mob-btn" id="mob-special"><div class="mob-icon">★</div><div>SPEC</div></div>
    <div class="mob-btn" id="mob-fire"><div class="mob-icon">◎</div><div>FIRE</div></div>
    <div class="mob-btn" id="mob-dodge"><div class="mob-icon">↷</div><div>DODGE</div></div>
  </div>
  <div class="joystick-zone" id="joy-look"><div class="joy-base"></div><div class="joy-nub" id="joy-look-nub"></div></div>
</div>

<div id="upgrade-overlay">
  <div id="upgrade-wrap">
    <h2 id="upgrade-title">BETWEEN WAVES</h2>
    <div class="sub">CHOOSE YOUR PATH — POWER AWAITS</div>
    <div id="upgrade-grid"></div>
  </div>
</div>

<div id="result-overlay">
  <div id="result-box">
    <div id="result-title"></div>
    <div id="result-stat1"></div>
    <div id="result-score"></div>
    <div id="result-stat2">FINAL SCORE</div>
    <div><button class="result-btn" onclick="showMenu()">MENU</button><button class="result-btn" onclick="restartSame()">PLAY AGAIN</button></div>
  </div>
</div>

<div id="overlay">
  <div id="main-menu-wrap">
    <div id="menu-title"><h1>AVATAR</h1><div class="sub">LAST STAND — CHOOSE YOUR CHAMPION</div></div>
    <div class="section-label">SELECT HERO</div>
    <div id="hero-grid"></div>
    <div id="hero-detail">
      <div id="detail-name">—</div>
      <div id="detail-title">—</div>
      <div id="detail-lore">Select a hero to see their story.</div>
      <div id="detail-stats"></div>
    </div>
    <button id="start-btn">BEGIN THE LAST STAND ›</button>
  </div>
</div>

<script>
// ─── HERO DEFINITIONS ─────────────────────────────────────────────────────────
const HEROES = [

  {id:'ryuu',name:'RYUU',title:'The Deep Diver',element:'water',

   special:{name:'Vortex Shield',icon:'🛡️',chi:28,desc:'Air vortex grants 4 seconds of invincibility + damages nearby enemies'},

  {id:'lian',name:'LIAN',title:'The Wind Architect',element:'air',

// ─── PORTRAIT RENDERING ───────────────────────────────────────────────────────
function drawPortrait(cvs, hero, size=64){
  const c = cvs.getContext('2d');
  const p = hero.portraitPalette;
  c.fillStyle = p[3]; c.fillRect(0,0,size,size);
  // Low-poly face
  c.fillStyle = p[0];
  // Head polygon
  c.beginPath();
  c.moveTo(size*0.5, size*0.08);
  c.lineTo(size*0.78, size*0.28);
  c.lineTo(size*0.72, size*0.62);
  c.lineTo(size*0.5, size*0.72);
  c.lineTo(size*0.28, size*0.62);
  c.lineTo(size*0.22, size*0.28);
  c.closePath(); c.fill();
  // Neck / body
  c.fillStyle = p[1];
  c.beginPath();
  c.moveTo(size*0.38, size*0.68); c.lineTo(size*0.62, size*0.68);
  c.lineTo(size*0.72, size*1.02); c.lineTo(size*0.28, size*1.02);
  c.closePath(); c.fill();
  // Brow ridge
  c.fillStyle = p[1];
  c.beginPath();
  c.moveTo(size*0.28, size*0.32); c.lineTo(size*0.72, size*0.32);
  c.lineTo(size*0.65, size*0.38); c.lineTo(size*0.35, size*0.38);
  c.closePath(); c.fill();
  // Eyes
  c.fillStyle = p[2];
  c.beginPath(); c.arc(size*0.38, size*0.44, size*0.06, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(size*0.62, size*0.44, size*0.06, 0, Math.PI*2); c.fill();
  c.fillStyle = '#000';
  c.beginPath(); c.arc(size*0.38, size*0.44, size*0.03, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(size*0.62, size*0.44, size*0.03, 0, Math.PI*2); c.fill();
  // Element mark on forehead
  c.fillStyle = p[2];
  c.beginPath(); c.arc(size*0.5, size*0.22, size*0.05, 0, Math.PI*2); c.fill();
}

function buildMenu(){
  const grid = document.getElementById('hero-grid');
  grid.innerHTML = '';
  HEROES.forEach(h => {
    const card = document.createElement('div');
    card.className = 'hero-card' + (h.id===selectedHeroId?' selected':'');
    card.dataset.id = h.id;
    const pc = document.createElement('canvas'); pc.width=48; pc.height=48;
    drawPortrait(pc, h, 48);
    const wrap = document.createElement('div'); wrap.className='hero-portrait'; wrap.appendChild(pc);
    card.innerHTML = `<div class="hero-card-name" style="color:${h.color}">${h.name}</div><div class="hero-card-title">${h.title}</div><div class="hero-card-element" style="color:${h.accent}">${h.element.toUpperCase()}</div>`;
    card.insertBefore(wrap, card.firstChild);
    card.addEventListener('click', ()=>{ selectedHeroId=h.id; updateMenuSelection(); });

}

// ─── WAVE SYSTEM ──────────────────────────────────────────────────────────────
function startNextWave(){
  wave++;
  betweenWave=false;
  envIndex = Math.floor((wave-1)/5) % ENVS.length;
  const env = ENVS[envIndex];
  document.getElementById('wave-val').textContent = wave+' / 30';
  const count = Math.min(5+Math.floor(wave*1.6),35);
  enemies=[];
  const isFinalBoss = wave===30;
  const isMidBoss = wave===15;
  for(let i=0;i<count;i++){
    let def;
    if(isFinalBoss && i===0) def=ENEMY_DEFS[6];
    else if(isMidBoss && i===0) def=ENEMY_DEFS[4];
    else {
      const pool=[];
      pool.push(ENEMY_DEFS[0],ENEMY_DEFS[0]);
      if(wave>=3) pool.push(ENEMY_DEFS[1]);
      if(wave>=5) pool.push(ENEMY_DEFS[5]);
      if(wave>=7) pool.push(ENEMY_DEFS[2]);
      if(wave>=12) pool.push(ENEMY_DEFS[3]);
      if(wave>=18) pool.push(ENEMY_DEFS[4]);
      def=pool[Math.floor(Math.random()*pool.length)];
    }
    const angle=(i/count)*Math.PI*2+Math.random()*0.4;
    const dist=550+Math.random()*450;
    const hpScale=1+wave*0.09;
    enemies.push({
      x:Math.cos(angle)*dist, z:Math.sin(angle)*dist, y:0,
      hp:def.hp*hpScale*(isFinalBoss&&i===0?3:1),
      maxHp:def.hp*hpScale*(isFinalBoss&&i===0?3:1),
      speed:def.speed*(1+wave*0.018),
      dmg:def.dmg*(1+wave*0.045),
      color:def.color, size:def.size, score:def.score,
      shoot:def.shoot||false, range:def.range||300,
      shootInterval:def.shootInterval||120, shootTimer:Math.random()*120,
      melee:def.melee||false, meleeRange:def.meleeRange||60, meleeTimer:0,
      zigzag:def.zigzag||false, zigzagTimer:0, zigzagDir:1,
      slowTimer:0, frozenTimer:0, stunTimer:0,
      boss:def.boss||false, finalBoss:def.finalBoss||false,
      name:def.name, id:def.id, dead:false,
      sandblind:false
    });
  }
  showWaveAnnounce();
  showLore(wave);
}

// ─── MOBILE JOYSTICKS ────────────────────────────────────────────────────────
function setupJoystick(zoneId, nubId, joyState){
  const zone=document.getElementById(zoneId);
  const nub=document.getElementById(nubId);
  joyState.nub=nub;
  zone.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    const r=zone.getBoundingClientRect();
    joyState.base={x:r.left+r.width/2,y:r.top+r.height/2};
    joyState.active=true;
    joyState.touchId=t.identifier;
  },{passive:false});
  zone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(let t of e.changedTouches){
      if(t.identifier===joyState.touchId){
        const dx=t.clientX-joyState.base.x, dy=t.clientY-joyState.base.y;
        const dist=Math.sqrt(dx*dx+dy*dy), maxR=48;
        const clamp=Math.min(dist,maxR), ang=Math.atan2(dy,dx);
        joyState.delta={x:Math.cos(ang)*clamp/maxR,y:Math.sin(ang)*clamp/maxR};
        nub.style.left=(60+Math.cos(ang)*clamp)+'px';
        nub.style.top=(60+Math.sin(ang)*clamp)+'px';
      }
    }
  },{passive:false});
  function end(e){
    for(let t of e.changedTouches){
      if(t.identifier===joyState.touchId){
        joyState.active=false; joyState.delta={x:0,y:0};
        nub.style.left='38px'; nub.style.top='38px';
      }
    }
  }
  zone.addEventListener('touchend',end); zone.addEventListener('touchcancel',end);
}

// ─── PLAYER ACTIONS ───────────────────────────────────────────────────────────
function tryDodge(){
  if(dodgeCooldown>0||isDodging) return;
  isDodging=true; dodgeTimer=200; dodgeCooldown=1400+(upgrades.dodgeSpeed*-150);
  const hero=player.hero;
  const spd=6*(1+upgrades.dodgeSpeed*0.25)*(hero.element==='air'?1.4:1);
  const fwd={x:Math.sin(player.yaw),z:Math.cos(player.yaw)};
  const ix=joyMove.active?joyMove.delta.x:(keys['KeyA']?-1:keys['KeyD']?1:0);
  const iz=joyMove.active?-joyMove.delta.y:(keys['KeyW']?1:keys['KeyS']?-1:0);
  if(Math.abs(ix)+Math.abs(iz)>0.1){
    const len=Math.sqrt(ix*ix+iz*iz);
    player.velX=(ix/len)*fwd.x*spd*1.5+(iz/len)*fwd.x*spd*1.5;
    player.velZ=(ix/len)*fwd.z*spd*1.5+(iz/len)*fwd.z*spd*1.5;
  } else { player.velX=-fwd.x*spd*2; player.velZ=-fwd.z*spd*2; }
  // Air bender: leave air burst on departure
  if(hero.element==='air'){
    spawnBurst(player.x,player.z,hero.color,8,3);
    projectiles.push({x:player.x,z:player.z,y:20,vx:0,vz:0,size:30,color:hero.color,dmg:(hero.quick.dmg+upgrades.damage*3)*0.6,life:15,player:true,aoe:true});
  } else {
    spawnBurst(player.x,player.z,hero.color,6,2.5);
  }
}

function trySpecial(){
  if(specialCooldown>0||chiAmount<player.hero.special.chi) return;
  chiAmount-=player.hero.special.chi;
  specialCooldown=9000;
  const hero=player.hero;
  const dmgMult=1+upgrades.damage*0.3+killRageStacks*0.05;
  document.getElementById('special-announce').textContent=hero.special.name.toUpperCase();
  document.getElementById('special-announce').style.color=hero.color;
  document.getElementById('special-announce').style.opacity='1';
  setTimeout(()=>document.getElementById('special-announce').style.opacity='0',1800);

  if(hero.id==='kael'||hero.id==='sira'){
    // Combustion Nova / Magma Veil
    if(hero.id==='kael'){
      for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2;projectiles.push({x:player.x,z:player.z,y:0,vx:Math.cos(a)*13,vz:Math.sin(a)*13,size:11,color:hero.color,dmg:hero.heavy.dmg*dmgMult,life:130,player:true});}
    } else {
      player.shield=true; player.shieldTimer=240;
      spawnBurst(player.x,player.z,hero.color,20,4);
    }
  } else if(hero.id==='vorn'){
    // Firestorm
    enemies.forEach(en=>{if(en.hp<=0) return; const dx=en.x-player.x,dz=en.z-player.z; if(Math.sqrt(dx*dx+dz*dz)<600){en.hp-=hero.heavy.dmg*dmgMult*0.8; checkKill(en); spawnBurst(en.x,en.z,hero.color,6,3);}});
  } else if(hero.element==='water'){
    if(hero.id==='naya'){ enemies.forEach(en=>{if(en.hp<=0) return; en.slowTimer=300;}); spawnBurst(player.x,player.z,hero.color,16,4); }
    else if(hero.id==='mira'){ enemies.forEach(en=>{if(en.hp<=0) return; const dx=en.x-player.x,dz=en.z-player.z; if(Math.sqrt(dx*dx+dz*dz)<320){en.frozenTimer=200;} }); spawnBurst(player.x,player.z,'#80e8ff',18,4); }
    else if(hero.id==='ryuu'){
      // Pull then blast
      enemies.forEach(en=>{if(en.hp<=0) return; const dx=player.x-en.x,dz=player.z-en.z; const d=Math.sqrt(dx*dx+dz*dz)||1; en.x+=dx/d*80; en.z+=dz/d*80;});
      setTimeout(()=>{
        enemies.forEach(en=>{if(en.hp<=0) return; const dx=en.x-player.x,dz=en.z-player.z; const d=Math.sqrt(dx*dx+dz*dz)||1; en.x+=dx/d*120; en.z+=dz/d*120; en.hp-=hero.heavy.dmg*dmgMult*0.7; checkKill(en); spawnBurst(en.x,en.z,hero.color,6,3);});
      },400);
      spawnBurst(player.x,player.z,hero.color,20,5);
    }
  } else if(hero.element==='earth'){
    if(hero.id==='goro'){
      enemies.forEach(en=>{if(en.hp<=0) return; const dx=en.x-player.x,dz=en.z-player.z; const d=Math.sqrt(dx*dx+dz*dz); if(d<500){en.hp-=hero.heavy.dmg*dmgMult*(1-d/500)*2; checkKill(en); spawnBurst(en.x,en.z,hero.color,8,3);}});
      for(let i=0;i<3;i++) setTimeout(()=>spawnBurst(player.x,player.z,hero.color,12+i*4,3+i),i*150);
    } else if(hero.id==='teva'){
      enemies.forEach(en=>{if(en.hp<=0) return; en.sandblind=true; en.slowTimer=250; en.hp-=hero.quick.dmg*dmgMult; checkKill(en);}); spawnBurst(player.x,player.z,'#c89040',20,5);
      setTimeout(()=>enemies.forEach(en=>en.sandblind=false),4000);
    } else if(hero.id==='brak'){
      player.armorTimer=360; player.shield=true; player.shieldTimer=360; spawnBurst(player.x,player.z,hero.color,16,4);
    }
  } else if(hero.element==='air'){
    if(hero.id==='zephyr'){
      player.shield=true; player.shieldTimer=240;
      enemies.forEach(en=>{if(en.hp<=0) return; const dx=en.x-player.x,dz=en.z-player.z; const d=Math.sqrt(dx*dx+dz*dz); if(d<200){en.hp-=hero.quick.dmg*dmgMult; checkKill(en);}});
      spawnBurst(player.x,player.z,hero.color,20,5);
    } else if(hero.id==='lian'){
      // Wind tunnel — piercing beam
      const dir={x:Math.sin(player.yaw),z:Math.cos(player.yaw)};
      enemies.forEach(en=>{
        if(en.hp<=0) return;
        const dx=en.x-player.x,dz=en.z-player.z;
        const dot=dx*dir.x+dz*dir.z;
        if(dot>0){const px=player.x+dir.x*dot,pz=player.z+dir.z*dot;const perp=Math.sqrt((en.x-px)**2+(en.z-pz)**2);if(perp<60){en.hp-=hero.heavy.dmg*dmgMult*2;checkKill(en);spawnBurst(en.x,en.z,hero.color,8,3);}}
      });
      spawnBurst(player.x+dir.x*200,player.z+dir.z*200,hero.color,12,4);
    } else if(hero.id==='sorak'){
      enemies.forEach(en=>{if(en.hp<=0) return; en.stunTimer=130;}); spawnBurst(player.x,player.z,hero.color,18,5);
    }
  }
}

function fireQuick(){
  const hero=player.hero;
  const cost=hero.quick.chi;
  if(chiAmount<cost) return;
  chiAmount-=cost;
  const dmg=(hero.quick.dmg+upgrades.damage*3)*(1+killRageStacks*0.05);
  // Vorn triple shot
  const shots = hero.id==='vorn'?3:1;
  for(let i=0;i<shots;i++){
    const spread=(shots>1)?(i-1)*0.12:0;
    const yaw=player.yaw+spread;
    const dir={x:Math.sin(yaw)*Math.cos(pitchAngle),z:Math.cos(yaw)*Math.cos(pitchAngle)};
    projectiles.push({x:player.x,z:player.z,y:pitchAngle*200,
      vx:dir.x*hero.quick.speed,vz:dir.z*hero.quick.speed,vy:-pitchAngle*hero.quick.speed,
      size:hero.quick.size,color:hero.color,dmg:dmg/(shots*0.8),life:130,
      player:true,pierce:hero.element==='air',slow:hero.element==='water'});
  }
  spawnParticle(player.x,player.z,hero.color,2,hero.quick.speed*0.4);
}

function fireHeavy(){
  const hero=player.hero;
  const cost=hero.heavy.chi;
  if(chiAmount<cost) return;
  chiAmount-=cost;
  const dmg=(hero.heavy.dmg+upgrades.damage*5)*(1+killRageStacks*0.05);
  const dir={x:Math.sin(player.yaw)*Math.cos(pitchAngle),z:Math.cos(player.yaw)*Math.cos(pitchAngle)};
  projectiles.push({x:player.x,z:player.z,y:pitchAngle*200,
    vx:dir.x*hero.heavy.speed,vz:dir.z*hero.heavy.speed,vy:-pitchAngle*hero.heavy.speed,
    size:hero.heavy.size,color:hero.color,dmg:dmg,life:170,player:true,heavy:true,
    pierce:hero.element==='air', slow:hero.element==='water'});
  for(let i=0;i<5;i++) spawnParticle(player.x,player.z,hero.color,3,hero.heavy.speed*0.25);
}

// ─── COMBAT ───────────────────────────────────────────────────────────────────
function checkKill(en){
  if(en.hp<=0&&!en.dead){
    en.dead=true; en.hp=0;
    const pts=en.score*(1+wave*0.1)|0;
    score+=pts;
    spawnBurst(en.x,en.z,en.color,14,3);
    floatingTexts.push({x:en.x,z:en.z,y:50,text:'+'+pts,color:en.color,life:80,vy:0.6});
    chiAmount=Math.min(chiMax,chiAmount+10);
    // Hero passive: rage stacks
    if(player.hero.id==='kael') killRageStacks=Math.min(8,killRageStacks+1);
    // Mira: restore HP on kill
    if(player.hero.id==='mira') player.hp=Math.min(player.maxHp,player.hp+5);
    addKillFeed(en.name);
  }
}

function addKillFeed(name){
  const hero=player.hero;
  const div=document.createElement('div');
  div.className='kill-entry';
  div.textContent=name+' '+KILL_TAUNTS[Math.floor(Math.random()*KILL_TAUNTS.length)];
  div.style.borderColor=hero.color;
  div.style.color=hero.color;
  document.getElementById('kill-feed').appendChild(div);
  setTimeout(()=>{div.style.opacity='0';setTimeout(()=>div.remove(),1000);},2500);
}

function takeDamage(amt){
  if(player.shield) return;
  // Brak armor reduction
  const reduction = player.armorTimer>0?0.3:1;
  player.hp-=amt*reduction;
  document.getElementById('hit-flash').style.opacity='1';
  setTimeout(()=>document.getElementById('hit-flash').style.opacity='0',130);
  if(player.hp<=0){ player.hp=0; doGameOver(); }
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticle(x,z,color,size,speed){
  const a=Math.random()*Math.PI*2;
  particles.push({x,z,vx:Math.cos(a)*speed*Math.random(),vz:Math.sin(a)*speed*Math.random(),size,color,life:30+Math.random()*30,maxLife:60});
}
function spawnBurst(x,z,color,count,size){for(let i=0;i<count;i++) spawnParticle(x,z,color,size,3+Math.random()*4);}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt){
  if(gState!=='playing') return;
  const hero=player.hero;

  // Apply look joystick
  applyLookJoystick(dt);

  // Chi regen
  chiAmount=Math.min(chiMax,chiAmount+(chiRegen+upgrades.chiRegen*0.04)*dt*0.06);
  if(specialCooldown>0) specialCooldown-=dt;
  if(isCharging) chargeTime+=dt;

  // Shield / armor timers
  if(player.shield){ player.shieldTimer-=dt; if(player.shieldTimer<=0) player.shield=false; }
  if(player.armorTimer>0) player.armorTimer-=dt;

  // Dodge
  if(isDodging){ dodgeTimer-=dt; if(dodgeTimer<=0){isDodging=false; player.velX*=0.2; player.velZ*=0.2;} }
  else { player.velX*=0.78; player.velZ*=0.78; }
  if(dodgeCooldown>0) dodgeCooldown-=dt;

  // Movement
  if(!isDodging){
    const baseSpd=3.2*hero.speed*(1+upgrades.speed*0.2);
    const ix=joyMove.active?joyMove.delta.x:(keys['KeyA']?-1:keys['KeyD']?1:0);
    const iz=joyMove.active?-joyMove.delta.y:(keys['KeyW']?1:keys['KeyS']?-1:0);
    if(Math.abs(ix)+Math.abs(iz)>0.05){
      const len=Math.sqrt(ix*ix+iz*iz)||1;
      const cos=Math.cos(player.yaw),sin=Math.sin(player.yaw);
      const wx=(ix/len)*sin+(iz/len)*cos, wz=(ix/len)*cos-(iz/len)*sin;
      player.velX+=wx*baseSpd*0.22*(dt/16);
      player.velZ+=wz*baseSpd*0.22*(dt/16);
      const maxV=baseSpd; const curV=Math.sqrt(player.velX**2+player.velZ**2);
      if(curV>maxV){player.velX=player.velX/curV*maxV; player.velZ=player.velZ/curV*maxV;}
    } else { player.velX*=0.82; player.velZ*=0.82; }
  }
  player.x+=player.velX*(dt/16);
  player.z+=player.velZ*(dt/16);

  // Enemies
  enemies.forEach(en=>{
    if(en.hp<=0) return;
    const dx=player.x-en.x, dz=player.z-en.z;
    const dist=Math.sqrt(dx*dx+dz*dz)||1;
    // Status effects
    if(en.frozenTimer>0){en.frozenTimer-=dt;return;}
    if(en.stunTimer>0){en.stunTimer-=dt;return;}
    const spd=en.speed*(en.slowTimer>0?0.4:1)*(en.sandblind?0.3:1)*(dt/16);
    if(en.slowTimer>0) en.slowTimer-=dt;

    // Movement
    if(en.zigzag){
      en.zigzagTimer-=dt;
      if(en.zigzagTimer<=0){en.zigzagDir*=-1;en.zigzagTimer=180+Math.random()*280;}
      const perp={x:-dz/dist,z:dx/dist};
      en.x+=(dx/dist*spd*0.65+perp.x*en.zigzagDir*spd*0.55);
      en.z+=(dz/dist*spd*0.65+perp.z*en.zigzagDir*spd*0.55);
    } else { en.x+=dx/dist*spd; en.z+=dz/dist*spd; }

    // Shooting
    if(en.shoot&&dist<en.range&&!en.sandblind){
      en.shootTimer-=dt;
      if(en.shootTimer<=0){
        en.shootTimer=en.shootInterval+Math.random()*80;
        if(dist>45){
          const speed=4.5+wave*0.08;
          const noise={x:(Math.random()-0.5)*0.15,z:(Math.random()-0.5)*0.15};
          projectiles.push({x:en.x,z:en.z,y:30,
            vx:dx/dist*speed+noise.x,vz:dz/dist*speed+noise.z,vy:0,
            size:7,color:en.color,dmg:en.dmg,life:220,player:false});
        }
      }
    }
    // Melee
    if(en.melee&&dist<(en.meleeRange||60)){
      en.meleeTimer-=dt;
      if(en.meleeTimer<=0){en.meleeTimer=90;takeDamage(en.dmg);}
    }
    // Boss taunts
    if(en.boss&&Math.random()<0.0003) addBossTaunt(en);
  });

  // Projectiles
  projectiles=projectiles.filter(p=>{
    p.x+=p.vx*(dt/16); p.z+=p.vz*(dt/16); p.y+=p.vy*(dt/16);
    p.life-=dt/16;
    if(p.life<=0) return false;
    if(p.player){
      let hit=false;
      enemies.forEach(en=>{
        if(en.hp<=0||(hit&&!p.pierce)) return;
        const dx2=en.x-p.x,dz2=en.z-p.z;
        if(Math.sqrt(dx2*dx2+dz2*dz2)<38*en.size){
          // Lian headshot passive (center screen = aimed straight)
          let dmgMult=1;
          if(player.hero.id==='lian'&&Math.abs(p.vx)<0.5) dmgMult=2;
          en.hp-=p.dmg*dmgMult;
          if(p.slow) en.slowTimer=180;
          spawnParticle(p.x,p.z,p.color,3,2);
          checkKill(en);
          if(!p.pierce) hit=true;
        }
      });
      return !hit;
    } else {
      const dx2=player.x-p.x,dz2=player.z-p.z;
      if(Math.sqrt(dx2*dx2+dz2*dz2)<28){
        if(!player.shield&&!isDodging) takeDamage(p.dmg);
        spawnParticle(p.x,p.z,p.color,4,2);
        return false;
      }
    }
    return true;
  });

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx*(dt/16);p.z+=p.vz*(dt/16);p.vx*=0.91;p.vz*=0.91;p.life-=dt/16;return p.life>0;});
  floatingTexts=floatingTexts.filter(ft=>{ft.y+=ft.vy*(dt/16);ft.life-=dt/16;return ft.life>0;});

  // Wave clear
  const alive=enemies.filter(e=>e.hp>0).length;
  if(alive===0&&!betweenWave){
    betweenWave=true;
    if(wave>=30){ setTimeout(()=>doWin(),1500); }
    else { setTimeout(()=>showUpgrade(),1400); }
  }

  updateHUD();
}

function addBossTaunt(en){
  const box=document.getElementById('lore-box');
  const taunts=['You cannot outlast me.','Your chi is fading.','Every bender falls.','The earth itself obeys me.'];
  document.getElementById('lore-speaker').textContent=en.name;
  document.getElementById('lore-speaker').style.color=en.color;
  document.getElementById('lore-text').textContent=taunts[Math.floor(Math.random()*taunts.length)];
  box.style.opacity='1'; setTimeout(()=>box.style.opacity='0',2500);
}

    {icon:'💨',name:'SWIFT FEET',desc:'Movement speed +20%',apply:()=>upgrades.speed++},
    {icon:'✦',name:'RESTORE',desc:'Fully heal HP and Chi',apply:()=>{player.hp=player.maxHp;chiAmount=chiMax;}},
    {icon:'☯',name:'CHI VESSEL',desc:'Max Chi +30',apply:()=>{upgrades.chiMax++;chiMax+=30;}},
    {icon:'↷',name:'EVASION',desc:'Dodge cooldown -20%',apply:()=>upgrades.dodgeSpeed++},

    {icon:'★',name:'SPECIAL MASTERY',desc:'Special cooldown -15%',apply:()=>{}},

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const env=ENVS[envIndex];
  const hero=player.hero;
  ctx.clearRect(0,0,W,H);
  const horizY=H*0.5+pitchAngle*H*0.65;

  // Sky
  ctx.fillStyle=env.sky; ctx.fillRect(0,0,W,horizY);
  // Sky low poly triangles
  for(let i=0;i<10;i++){
    const x1=i*(W/5),x2=x1+W/5,x3=(x1+x2)/2,y3=horizY*(0.25+0.5*(i%3)/2);
    ctx.beginPath();ctx.moveTo(x1,0);ctx.lineTo(x2,0);ctx.lineTo(x3,y3);
    ctx.fillStyle=env.sky+(i%2?'60':'28');ctx.fill();
  }
  // Horizon
  const hg=ctx.createLinearGradient(0,horizY-90,0,horizY+25);
  hg.addColorStop(0,'transparent');hg.addColorStop(0.5,env.horizon+'cc');hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg;ctx.fillRect(0,horizY-90,W,115);

  // Ground
  ctx.fillStyle=env.ground;ctx.fillRect(0,horizY,W,H-horizY);
  for(let col=0;col<14;col++){
    for(let row=0;row<5;row++){
      const gx=col*(W/7)-W/14,gy=horizY+row*((H-horizY)/5);
      const gx2=gx+W/7,gy2=gy+(H-horizY)/5;
      ctx.beginPath();
      if((col+row)%2===0){ctx.moveTo(gx,gy);ctx.lineTo(gx2,gy);ctx.lineTo(gx,gy2);}
      else{ctx.moveTo(gx2,gy);ctx.lineTo(gx2,gy2);ctx.lineTo(gx,gy2);}
      ctx.fillStyle=row%2===0?env.poly1:env.poly2;ctx.fill();
    }
  }
  // Grid
  ctx.strokeStyle=env.gridColor;ctx.lineWidth=0.8;
  for(let i=0;i<18;i++){
    const d=(i+1)*75;const sy=horizY+d*0.38;if(sy>H)break;
    const pw=W*(1+d*0.006);
    ctx.beginPath();ctx.moveTo(W/2-pw/2,sy);ctx.lineTo(W/2+pw/2,sy);ctx.stroke();
  }

  // World-to-screen
  function w2s(wx,wz,wy=0){
    const dx=wx-player.x,dz=wz-player.z;
    const cos=Math.cos(-player.yaw),sin=Math.sin(-player.yaw);
    const rx=dx*cos-dz*sin,rz=dx*sin+dz*cos;
    if(rz<=0.05) return null;
    const fov=1.15;
    return {sx:W/2+(rx/rz)*W/fov, sy:horizY-(wy/rz)*W/fov+(pitchAngle*W/rz)*0.3,
            scale:W/(rz*fov),dist:Math.sqrt(dx*dx+dz*dz),rz};
  }

  // Enemies (back to front)
  [...enemies].sort((a,b)=>{
    const da=Math.sqrt((a.x-player.x)**2+(a.z-player.z)**2);
    const db=Math.sqrt((b.x-player.x)**2+(b.z-player.z)**2);
    return db-da;
  }).forEach(en=>{
    if(en.hp<=0) return;
    const s=w2s(en.x,en.z,0); if(!s||s.rz>900) return;
    const bs=40*en.size*s.scale*0.42; if(bs<2) return;
    const bx=s.sx,by=s.sy,h=bs*2.1,w2=bs*1.4;

    // Frozen tint
    const tint=en.frozenTimer>0?'#80d0ff':en.stunTimer>0?'#ffcc00':en.color;

    // Shadow
    ctx.beginPath();ctx.ellipse(bx,by+h*0.08,w2*0.55,h*0.07,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();

    // Body
    ctx.beginPath();
    ctx.moveTo(bx,by-h);ctx.lineTo(bx+w2*0.6,by-h*0.55);
    ctx.lineTo(bx+w2*0.5,by);ctx.lineTo(bx,by+h*0.05);
    ctx.lineTo(bx-w2*0.5,by);ctx.lineTo(bx-w2*0.6,by-h*0.55);
    ctx.closePath();ctx.fillStyle=tint;ctx.fill();
    ctx.strokeStyle=tint+'66';ctx.lineWidth=0.8;ctx.stroke();

    // Head polygon
    ctx.beginPath();
    ctx.moveTo(bx,by-h*1.12);ctx.lineTo(bx+w2*0.38,by-h*0.84);
    ctx.lineTo(bx+w2*0.28,by-h*0.58);ctx.lineTo(bx-w2*0.28,by-h*0.58);
    ctx.lineTo(bx-w2*0.38,by-h*0.84);ctx.closePath();
    ctx.fillStyle=tint+'bb';ctx.fill();

    // Eyes
    ctx.shadowColor=en.boss?'#ff0000':tint;ctx.shadowBlur=8;
    ctx.fillStyle=en.boss?'#ff5533':'white';
    ctx.beginPath();ctx.arc(bx-w2*0.11,by-h*0.76,bs*0.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+w2*0.11,by-h*0.76,bs*0.1,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // HP bar
    if(en.hp<en.maxHp){
      const bw=w2*1.5;
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(bx-bw/2,by-h-12,bw,5);
      ctx.fillStyle=en.boss?'#ff3300':tint;
      ctx.fillRect(bx-bw/2,by-h-12,bw*(en.hp/en.maxHp),5);
    }
    // Boss label
    if(en.boss){
      const fz=Math.max(9,bs*0.38);
      ctx.font=`bold ${fz}px Courier New`;ctx.textAlign='center';
      ctx.fillStyle='#ff2200';ctx.shadowColor='#ff2200';ctx.shadowBlur=12;
      ctx.fillText(en.finalBoss?'◆ WARLORD':'◆ BOSS',bx,by-h-18);
      ctx.shadowBlur=0;
    }
    // Status indicators
    if(en.slowTimer>0){ctx.fillStyle='#80ccff';ctx.font='8px Courier New';ctx.fillText('SLOW',bx,by-h-(en.boss?28:16));}
    if(en.sandblind){ctx.fillStyle='#f0c060';ctx.font='8px Courier New';ctx.fillText('BLIND',bx,by-h-(en.boss?36:24));}
  });

  // Projectiles
  projectiles.forEach(p=>{
    const s=w2s(p.x,p.z,p.y); if(!s||s.rz>1400) return;
    const sz=p.size*s.scale*0.5; if(sz<0.5) return;
    if(p.player){
      ctx.shadowColor=p.color;ctx.shadowBlur=sz*5;
      ctx.beginPath();
      ctx.moveTo(s.sx,s.sy-sz*2.2);ctx.lineTo(s.sx+sz*1.1,s.sy);
      ctx.lineTo(s.sx,s.sy+sz*2.2);ctx.lineTo(s.sx-sz*1.1,s.sy);
      ctx.closePath();ctx.fillStyle=p.color;ctx.fill();
      ctx.shadowBlur=0;
    } else {
      ctx.shadowColor=p.color;ctx.shadowBlur=sz*4;
      ctx.beginPath();ctx.arc(s.sx,s.sy,sz*1.6,0,Math.PI*2);
      ctx.fillStyle=p.color+'cc';ctx.fill();ctx.shadowBlur=0;
    }
  });

  // Particles
  ctx.save();
  particles.forEach(p=>{
    const s=w2s(p.x,p.z,0); if(!s||s.rz>900) return;
    const sz=p.size*s.scale*0.38; if(sz<0.4) return;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.beginPath();ctx.arc(s.sx,s.sy,sz,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  });
  ctx.globalAlpha=1;ctx.restore();

  // Floating texts
  ctx.save();
  floatingTexts.forEach(ft=>{
    const s=w2s(ft.x,ft.z,ft.y); if(!s||s.rz>900) return;
    const fz=Math.max(10,18*s.scale*0.5);
    ctx.globalAlpha=ft.life/80;
    ctx.font=`bold ${fz}px Courier New`;ctx.textAlign='center';
    ctx.fillStyle=ft.color;ctx.shadowColor=ft.color;ctx.shadowBlur=8;
    ctx.fillText(ft.text,s.sx,s.sy);ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;ctx.restore();

  // Shield aura
  if(player.shield){
    const r=90*(player.shieldTimer/(player.armorTimer>0?360:240))+15;
    const col=player.hero.element==='earth'&&player.hero.id==='brak'?'#a0a060':player.hero.color;
    const sg=ctx.createRadialGradient(W/2,horizY,0,W/2,horizY,r);
    sg.addColorStop(0,col+'50');sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W/2,horizY,r,0,Math.PI*2);ctx.fill();
  }

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.82);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // Special cooldown ring
  if(specialCooldown>0){
    const prog=1-specialCooldown/9000;
    ctx.strokeStyle=hero.color+'70';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(W/2,H/2,20,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(ts){
  if(gState!=='playing') return;
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  update(dt);render();
  animFrame=requestAnimationFrame(loop);
}

// ─── GAME OVER / WIN ──────────────────────────────────────────────────────────
function doGameOver(){
  gState='over';
  lastHeroId=selectedHeroId;
  if(locked&&document.exitPointerLock) document.exitPointerLock();locked=false;
  document.getElementById('result-overlay').style.display='flex';
  document.getElementById('result-title').textContent='FALLEN';
  document.getElementById('result-title').style.color='#ee4433';
  document.getElementById('result-stat1').textContent='SURVIVED TO WAVE '+wave+' OF 30';
  document.getElementById('result-score').textContent=score;
  document.getElementById('result-score').style.color=player.hero.color;
}
function doWin(){
  gState='over';
  lastHeroId=selectedHeroId;
  if(locked&&document.exitPointerLock) document.exitPointerLock();locked=false;
  document.getElementById('result-overlay').style.display='flex';
  document.getElementById('result-title').textContent='VICTORIOUS';
  document.getElementById('result-title').style.color='#44ee66';
  document.getElementById('result-stat1').textContent='ALL 30 WAVES SURVIVED · '+player.hero.name.toUpperCase();
  document.getElementById('result-score').textContent=score;
  document.getElementById('result-score').style.color=player.hero.color;
}

window.showMenu=function(){
  gState='menu';
  cancelAnimationFrame(animFrame);
  document.getElementById('overlay').style.display='flex';
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('upgrade-overlay').style.display='none';
  document.getElementById('mobile-controls').style.display='none';
  if(locked&&document.exitPointerLock) document.exitPointerLock();locked=false;
  buildMenu();
};

// ─── MENU BACKGROUND ANIMATION ───────────────────────────────────────────────
(function menuBg(){
  if(gState!=='menu'){setTimeout(menuBg,100);return;}
  ctx.clearRect(0,0,W,H);
  const t=Date.now()/1000;
  ctx.fillStyle='#05030a';ctx.fillRect(0,0,W,H);
  const cols=['#ff552222','#30b0ff22','#a0704022','#c0e0ff18','#9966cc22'];
  for(let i=0;i<24;i++){
    const x=(Math.sin(t*0.25+i*0.8)*0.5+0.5)*W;
    const y=(Math.cos(t*0.18+i*1.1)*0.5+0.5)*H;
    const s=40+Math.sin(t+i)*25;
    ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y+s);ctx.lineTo(x-s,y+s);
    ctx.fillStyle=cols[i%cols.length];ctx.fill();
  }
  requestAnimationFrame(menuBg);
})();
</script>
